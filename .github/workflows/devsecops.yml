name: MedUnity DevSecOps - PHP Enterprise Clean

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  security-events: write
  contents: read

jobs:

  # =========================================================
  # PHPSTAN (SAST CORE)
  # =========================================================
  phpstan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install PHPStan
        run: composer require --dev phpstan/phpstan

      - name: Run PHPStan
        run: |
          mkdir -p reports
          vendor/bin/phpstan analyse . --level=max --error-format=json > reports/phpstan.json || true

      - name: PHPStan Security Gate
        run: |
          ERRORS=$(jq '.totals.errors' reports/phpstan.json)

          echo "PHPStan errors: $ERRORS"

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ PHPStan failed"
            exit 1
          fi

      - name: Upload PHPStan Report
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-report
          path: reports/phpstan.json


  # =========================================================
  # SEMGREP (PHP SECURITY SAST)
  # =========================================================
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (security-only baseline)
        run: |
          mkdir -p reports

          semgrep scan \
            --config=p/php \
            --config=p/security-audit \
            --severity ERROR \
            --sarif \
            --output reports/semgrep.sarif \
            . || true

          semgrep scan \
            --config=p/security-audit \
            --json \
            --output reports/semgrep.json \
            . || true

      - name: Fail only on REAL critical vulnerabilities
        run: |
          CRITICAL=$(jq '[.results[]
            | select(.extra.severity=="ERROR")
          ] | length' reports/semgrep.json)

          echo "Critical issues: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ BLOCKED: Critical security issues only"
            exit 1
          fi

          echo "✅ Passed security gate (warnings ignored)"

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/

  # =========================================================
  # COMPOSER AUDIT (SCA PHP)
  # =========================================================
  composer-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Composer Audit
        run: |
          mkdir -p reports
          composer audit --format=json > reports/composer-audit.json || true

      - name: Security Gate
        run: |
          VULN=$(jq '.advisories | length' reports/composer-audit.json)

          echo "Composer vulnerabilities: $VULN"

          if [ "$VULN" -gt 0 ]; then
            echo "❌ Composer vulnerabilities detected"
            exit 1
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: composer-audit
          path: reports/composer-audit.json

  # =========================================================
  # GITLEAKS (SECRETS DETECTION)
  # =========================================================
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64
          chmod +x gitleaks-linux-amd64
          sudo mv gitleaks-linux-amd64 /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          mkdir -p reports
          gitleaks detect --source . --report-format json --report-path reports/gitleaks.json || true

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks.json

  # =========================================================
  # SECURITY REPORT AGGREGATION (REAL METRICS ONLY)
  # =========================================================
  security-report:
    runs-on: ubuntu-latest
    needs: [phpstan, semgrep, composer-audit, gitleaks]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Build Real Security Report
        run: |
          mkdir -p reports

          # PHPStan errors
          if [ -f reports/phpstan-report/phpstan.json ]; then
            PHPSTAN_ERRORS=$(jq '.totals.errors' reports/phpstan-report/phpstan.json)
          else
            PHPSTAN_ERRORS=0
          fi

          # Composer vulnerabilities
          if [ -f reports/composer-audit/composer-audit.json ]; then
            COMPOSER_VULN=$(jq '.advisories | length' reports/composer-audit/composer-audit.json)
          else
            COMPOSER_VULN=0
          fi

          # Secrets found
          if [ -f reports/gitleaks-report/gitleaks.json ]; then
            SECRETS=$(jq length reports/gitleaks-report/gitleaks.json)
          else
            SECRETS=0
          fi

          # Semgrep critical errors
          if [ -f reports/semgrep-report/semgrep.json ]; then
            SEMGREP_CRITICAL=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' reports/semgrep-report/semgrep.json)
          else
            SEMGREP_CRITICAL=0
          fi

          echo "{
            \"phpstan_errors\": $PHPSTAN_ERRORS,
            \"semgrep_critical\": $SEMGREP_CRITICAL,
            \"composer_vulnerabilities\": $COMPOSER_VULN,
            \"secrets\": $SECRETS,
            \"timestamp\": \"$(date -Iseconds)\",
            \"status\": \"$([ $PHPSTAN_ERRORS -eq 0 ] && [ $SEMGREP_CRITICAL -eq 0 ] && [ $COMPOSER_VULN -eq 0 ] && [ $SECRETS -eq 0 ] && echo "PASSED" || echo "FAILED")\"
          }" > reports/security-report.json

          cat reports/security-report.json

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security-report.json

  # =========================================================
  # DEPLOY (ONLY IF ALL PASSED)
  # =========================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [security-report]
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/medunity
            git pull origin main
            composer install --no-dev --optimize-autoloader
            sudo systemctl restart apache2 || sudo systemctl restart nginx || true
