name: MedUnity PHP Enterprise DevSecOps Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  security-events: write
  contents: read

env:
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

jobs:

# =========================================================
# SBOM
# =========================================================
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: syft dir:. -o json > sbom.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json


# =========================================================
# SAST - PHPStan
# =========================================================
  sast-phpstan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Install deps
        run: composer install || true

      - name: Run PHPStan
        run: |
          mkdir -p reports
          vendor/bin/phpstan analyse . --level=max --error-format=json > reports/phpstan.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: phpstan
          path: reports/phpstan.json


# =========================================================
# SAST - SEMGREP (PHP ONLY)
# =========================================================
  sast-semgrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Scan PHP
        run: |
          mkdir -p reports
          semgrep scan \
            --config=p/php \
            --config=p/security-audit \
            --sarif \
            --output reports/semgrep.sarif \
            . || true

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep
          path: reports/


# =========================================================
# SCA - COMPOSER AUDIT
# =========================================================
  sca-composer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Install deps
        run: composer install || true

      - name: Composer audit
        run: |
          mkdir -p reports
          composer audit --format=json > reports/composer-audit.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: composer-audit
          path: reports/composer-audit.json


# =========================================================
# SCA - TRIVY FS
# =========================================================
  sca-trivy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: FS Scan
        run: |
          mkdir -p reports
          trivy fs --severity HIGH,CRITICAL --format json \
            -o reports/trivy.json . || true

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-fs
          path: reports/trivy.json


# =========================================================
# SECRET SCANNING
# =========================================================
  secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          mkdir -p reports
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks \
            detect --source /repo \
            --report-format sarif \
            --report-path /repo/reports/gitleaks.sarif || true

      - uses: actions/upload-artifact@v4
        with:
          name: gitleaks
          path: reports/gitleaks.sarif


# =========================================================
# SONARQUBE - QUALITY GATE (ENTERPRISE CORE)
# =========================================================
  sonar:
    runs-on: ubuntu-latest
    needs: [sast-phpstan, sast-semgrep]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


# =========================================================
# CONTAINER SCAN
# =========================================================
  container:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker compose build

      - name: Scan images
        run: |
          mkdir -p reports
          trivy image --severity HIGH,CRITICAL \
            --format json -o reports/container.json medunity || true

      - uses: actions/upload-artifact@v4
        with:
          name: container-scan
          path: reports/container.json


# =========================================================
# IAC CHECKOV
# =========================================================
  iac:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkov
        run: |
          pip install checkov
          mkdir -p reports
          checkov -d . --framework dockerfile,yaml \
            --output json > reports/checkov.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: checkov
          path: reports/checkov.json


# =========================================================
# DAST - ZAP
# =========================================================
  dast:
    runs-on: ubuntu-latest
    needs: [sonar]

    steps:
      - uses: actions/checkout@v4

      - name: Start app
        run: docker compose up -d

      - name: ZAP scan
        run: |
          mkdir -p reports
          docker run --rm --network host \
            -v $PWD/reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy \
            zap-baseline.py -t http://localhost:8080 \
            -r zap.html -J zap.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: zap
          path: reports/

      - name: Stop app
        if: always()
        run: docker compose down
